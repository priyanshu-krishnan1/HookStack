version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: webhook-template-postgres
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./shared/schema.sql:/docker-entrypoint-initdb.d/001-schema.sql

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: webhook-template-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: app_user
      RABBITMQ_DEFAULT_PASS: app_password
    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres_data:

